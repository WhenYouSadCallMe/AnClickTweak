<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>安点击网络联动</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #101113;
      color: #f5f5f5;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101113;
    }
    main {
      width: min(560px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      background: #191b1f;
      box-shadow: 0 18px 48px rgba(0,0,0,.34);
    }
    h1 {
      margin: 0 0 18px;
      font-size: 24px;
      letter-spacing: 0;
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px;
      border-radius: 8px;
      background: #0f1115;
      border: 1px solid rgba(255,255,255,.10);
      margin-bottom: 18px;
    }
    .label {
      color: rgba(255,255,255,.68);
      font-size: 14px;
    }
    .value {
      font-size: 30px;
      font-weight: 800;
    }
    .value.true {
      color: #4ade80;
    }
    .value.false {
      color: #fb7185;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    button {
      height: 46px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #3b82f6;
    }
    button.false {
      background: #e11d48;
    }
    button.true {
      background: #16a34a;
    }
    button:disabled {
      opacity: .55;
      cursor: wait;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 16px 0 0;
      padding: 12px;
      border-radius: 8px;
      color: rgba(255,255,255,.78);
      background: #0f1115;
      border: 1px solid rgba(255,255,255,.08);
      min-height: 48px;
    }
    @media (max-width: 520px) {
      main {
        padding: 20px;
      }
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>安点击网络联动</h1>
    <section class="status">
      <div>
        <div class="label">当前状态</div>
        <div id="statusText" class="value">读取中</div>
      </div>
      <div id="updatedAt" class="label"></div>
    </section>
    <section class="actions">
      <button id="refreshBtn" type="button">查询状态</button>
      <button id="trueBtn" class="true" type="button">设为 true</button>
      <button id="falseBtn" class="false" type="button">设为 false</button>
    </section>
    <pre id="result">等待操作</pre>
  </main>

  <script>
    const statusText = document.getElementById('statusText');
    const updatedAt = document.getElementById('updatedAt');
    const result = document.getElementById('result');
    const buttons = Array.from(document.querySelectorAll('button'));

    function setBusy(busy) {
      buttons.forEach(button => button.disabled = busy);
    }

    function renderStatus(data) {
      if (typeof data.status !== 'boolean') {
        return;
      }
      statusText.textContent = String(data.status);
      statusText.className = 'value ' + String(data.status);
      updatedAt.textContent = new Date().toLocaleTimeString();
    }

    async function request(path, refreshAfter) {
      setBusy(true);
      try {
        const response = await fetch(path, { cache: 'no-store' });
        const data = await response.json();
        result.textContent = JSON.stringify(data, null, 2);
        renderStatus(data);
        if (refreshAfter) {
          await request('/get_status_anclick', false);
        }
      } catch (error) {
        result.textContent = '请求失败: ' + error.message;
      } finally {
        setBusy(false);
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', () => request('/get_status_anclick', false));
    document.getElementById('trueBtn').addEventListener('click', () => request('/set_true_anclick', true));
    document.getElementById('falseBtn').addEventListener('click', () => request('/set_false_anclick', true));

    request('/get_status_anclick', false);
    setInterval(() => request('/get_status_anclick', false), 5000);
  </script>
</body>
</html>
