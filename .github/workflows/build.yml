name: Build AnClick dylib

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid xz cmake
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "$HOME/theos/bin" >> "$GITHUB_PATH"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Build local OpenCV for iOS
        run: |
          curl -L --retry 3 --retry-delay 5 \
            -o opencv-source.zip \
            "https://github.com/opencv/opencv/archive/refs/tags/4.10.0.zip"
          unzip -q opencv-source.zip
          python3 opencv-4.10.0/platforms/ios/build_framework.py opencv-ios \
            --legacy_build \
            --disable-swift \
            --disable-bitcode \
            --iphoneos_archs arm64 \
            --build_only_specified_archs \
            --without objc \
            --without calib3d \
            --without dnn \
            --without features2d \
            --without flann \
            --without gapi \
            --without highgui \
            --without imgcodecs \
            --without ml \
            --without objdetect \
            --without photo \
            --without stitching \
            --without video \
            --without videoio \
            --without world \
            --without java \
            --without js \
            --without python2 \
            --without python3 \
            --without ts
          test -e opencv-ios/opencv2.framework/opencv2
          header_file="$(find opencv-ios/opencv2.framework/Headers -name core.hpp -type f -print -quit)"
          test -n "$header_file"
          mkdir -p opencv-ios-headers/opencv2
          header_dir="$(dirname "$header_file")"
          if [ "$(basename "$header_dir")" = "opencv2" ]; then
            cp -R "$header_dir"/. opencv-ios-headers/opencv2/
          else
            cp -R opencv-ios/opencv2.framework/Headers/. opencv-ios-headers/opencv2/
          fi
          test -f opencv-ios/opencv2.framework/opencv2
          test -f opencv-ios-headers/opencv2/core.hpp
          file opencv-ios/opencv2.framework/opencv2
          otool -L opencv-ios/opencv2.framework/opencv2 || true

      - name: Build dylib
        run: |
          make clean all FINALPACKAGE=1
          mkdir -p build-artifacts
          dylib_path="$(find .theos/obj -name 'AnClick.dylib' -type f ! -path '*.dSYM/*' -print -quit)"
          test -n "$dylib_path"
          cp "$dylib_path" build-artifacts/AnClick.dylib
          test -f build-artifacts/AnClick.dylib
          file build-artifacts/AnClick.dylib
          otool -hv build-artifacts/AnClick.dylib
          otool -L build-artifacts/AnClick.dylib
          ldid -S build-artifacts/AnClick.dylib

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: AnClick-build-diagnostics
          path: |
            .theos/**
            opencv-ios/**
            opencv-ios-headers/**
          include-hidden-files: true

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: AnClick-dylib
          path: build-artifacts/AnClick.dylib
